<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trisha's Stress Relief Zone</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 45%, #ffeaa7 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
    user-select: none;
    -webkit-user-select: none;
  }

  #header {
    text-align: center;
    padding: 18px 20px 8px;
  }
  #header h1 {
    font-size: 1.25rem;
    color: #5b21b6;
    font-weight: 800;
    text-shadow: 1px 1px 0 #fff;
  }

  #score-bar {
    display: inline-block;
    background: rgba(255,255,255,0.8);
    border-radius: 30px;
    padding: 5px 20px;
    font-size: 0.95rem;
    font-weight: 700;
    color: #e84393;
    margin-top: 7px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }

  #toast {
    min-height: 28px;
    font-size: 0.88rem;
    font-weight: 700;
    color: #5b21b6;
    background: rgba(255,255,255,0.7);
    border-radius: 20px;
    padding: 4px 18px;
    margin-top: 7px;
    text-align: center;
    transition: opacity 0.25s;
    max-width: 90vw;
  }

  #arena {
    position: relative;
    width: min(97vw, 560px);
    height: 430px;
    margin-top: 8px;
    background: rgba(255,255,255,0.3);
    border-radius: 28px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    overflow: visible;
  }

  /* CHARACTERS */
  .char {
    position: absolute;
    bottom: 26px;
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    z-index: 9;
  }

  .char-face {
    width: 72px;
    height: 76px;
    border-radius: 50% 50% 42% 42% / 55% 55% 45% 45%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.4rem;
    box-shadow: 0 4px 14px rgba(0,0,0,0.18);
    transition: transform 0.12s;
  }
  .char:hover .char-face { transform: scale(1.08); }

  .char-label {
    font-size: 0.82rem;
    font-weight: 800;
    margin-top: 5px;
    text-shadow: 0 1px 0 #fff;
  }

  .hp-wrap {
    width: 60px; height: 7px;
    background: rgba(0,0,0,0.14);
    border-radius: 4px;
    overflow: hidden;
    margin-top: 5px;
  }
  .hp-fill { height: 100%; border-radius: 4px; transition: width 0.28s; background: #ef4444; }

  #vijaya { left: 8%; }
  #vijaya .char-face  { background: #fb923c; }
  #vijaya .char-label { color: #92400e; }

  #kodru { right: 8%; }
  #kodru .char-face  { background: #34d399; }
  #kodru .char-label { color: #065f46; }

  /* TRISHA */
  #trisha {
    position: absolute;
    bottom: 26px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    pointer-events: none;
    z-index: 11;
  }
  #trisha .char-face  { background: #a78bfa; font-size: 2.2rem; }
  #trisha .char-label { color: #5b21b6; font-weight: 800; font-size: 0.82rem; margin-top: 5px; }

  #trisha.hit-left  { animation: t-left  0.42s ease; }
  #trisha.hit-right { animation: t-right 0.42s ease; }

  @keyframes t-left {
    0%  { transform: translateX(-50%); }
    30% { transform: translateX(calc(-50% - 65px)) rotate(-22deg); }
    65% { transform: translateX(calc(-50% + 10px)) rotate(10deg); }
    100%{ transform: translateX(-50%); }
  }
  @keyframes t-right {
    0%  { transform: translateX(-50%); }
    30% { transform: translateX(calc(-50% + 65px)) rotate(22deg); }
    65% { transform: translateX(calc(-50% - 10px)) rotate(-10deg); }
    100%{ transform: translateX(-50%); }
  }

  /* BONK */
  .char.bonked { animation: bonk 0.33s ease; }
  @keyframes bonk {
    0%  { transform: translateY(0) rotate(0); }
    25% { transform: translateY(-18px) rotate(-14deg); }
    55% { transform: translateY(5px) rotate(10deg); }
    75% { transform: translateY(-8px) rotate(-5deg); }
    100%{ transform: translateY(0) rotate(0); }
  }

  /* FLY AWAY */
  .char.fly-away { animation: fly-away 0.65s ease forwards; pointer-events: none; }
  @keyframes fly-away {
    0%  { transform: translateY(0) scale(1) rotate(0); opacity: 1; }
    55% { transform: translateY(-150px) scale(0.5) rotate(22deg); opacity: 0.7; }
    100%{ transform: translateY(-300px) scale(0.05) rotate(60deg); opacity: 0; }
  }

  /* STARS */
  .star {
    position: absolute; pointer-events: none; z-index: 20;
    font-size: 1.3rem;
    animation: star-pop 0.6s ease forwards;
  }
  @keyframes star-pop {
    0%  { transform: translate(0,0) scale(0.2); opacity: 1; }
    70% { opacity: 1; }
    100%{ transform: translate(var(--dx),var(--dy)) scale(1.1); opacity: 0; }
  }

  /* BYE LABEL */
  .bye {
    position: absolute; font-size: 1.05rem; font-weight: 800;
    color: #5b21b6; pointer-events: none; z-index: 25;
    animation: bye-rise 1.1s ease forwards;
    white-space: nowrap; text-shadow: 1px 1px 0 #fff;
  }
  @keyframes bye-rise {
    0%  { transform: translateY(0) scale(0.7); opacity: 1; }
    65% { transform: translateY(-60px) scale(1.1); opacity: 1; }
    100%{ transform: translateY(-90px) scale(0.9); opacity: 0; }
  }

  /* WIN SCREEN */
  #win {
    display: none;
    position: absolute; inset: 0;
    background: rgba(255,255,255,0.93);
    border-radius: 28px;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 50;
    text-align: center;
    padding: 24px 28px;
    animation: fade-in 0.5s ease;
  }
  #win.show { display: flex; }
  @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }

  #win .trophy  { font-size: 3.2rem; margin-bottom: 6px; }
  #win h2       { font-size: 1.55rem; color: #5b21b6; font-weight: 800; margin-bottom: 8px; }
  #win .vc-line { font-size: 0.95rem; color: #374151; margin-bottom: 10px; line-height: 1.6; }
  #win .roast   {
    font-size: 0.85rem; color: #9d174d;
    background: rgba(244,114,182,0.15);
    border-radius: 14px; padding: 8px 16px;
    margin-bottom: 18px; font-style: italic; line-height: 1.5;
  }

  #play-again {
    background: #7c3aed; color: #fff;
    border: none; border-radius: 30px;
    padding: 12px 30px;
    font-size: 0.95rem; font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(124,58,237,0.4);
    transition: transform 0.15s;
  }
  #play-again:hover  { transform: scale(1.05); }
  #play-again:active { transform: scale(0.97); }

  /* CONFETTI */
  .conf {
    position: absolute; width: 9px; height: 9px;
    border-radius: 2px; pointer-events: none; z-index: 55;
    animation: conf-fall var(--dur) ease forwards;
  }
  @keyframes conf-fall {
    0%  { transform: translateY(-10px) rotate(0); opacity: 1; }
    100%{ transform: translateY(460px) rotate(720deg); opacity: 0; }
  }

  #hint {
    font-size: 0.8rem; color: #5b21b6;
    opacity: 0.7; margin-top: 8px;
    animation: pulse 2.2s ease infinite;
  }
  @keyframes pulse {
    0%,100%{ opacity: 0.5; }
    50%    { opacity: 1; }
  }
</style>
</head>
<body>

<div id="header">
  <h1>Trisha's Stress Relief Zone 😄</h1>
  <div id="score-bar">Frustration released: <span id="score">0</span></div>
</div>

<div id="toast">Tap someone. You know you want to. 👀</div>

<div id="arena">

  <div class="char" id="vijaya" onclick="bonk('vijaya')">
    <div class="char-face">😤</div>
    <div class="char-label">Vijaya</div>
    <div class="hp-wrap"><div class="hp-fill" id="vijaya-hp"></div></div>
  </div>

  <div class="char" id="kodru" onclick="bonk('kodru')">
    <div class="char-face">😈</div>
    <div class="char-label">Kodru</div>
    <div class="hp-wrap"><div class="hp-fill" id="kodru-hp"></div></div>
  </div>

  <div id="trisha">
    <div class="char-face">😊</div>
    <div class="char-label">Trisha</div>
  </div>

  <div id="win">
    <div class="trophy">😌✨</div>
    <h2>Trisha feels amazing now!</h2>
    <p class="vc-line">Next level: VCs.<br>That's where real peace begins 😏</p>
    <p class="roast">Bonus level: hit Devashish for extra peace 😄</p>
    <button id="play-again" onclick="reset()">Phir se frustration nikaalein? 🔁</button>
  </div>

</div>

<p id="hint">Tap Vijaya or Kodru to begin 👇</p>

<script>
const MAX = { vijaya: 6, kodru: 6 };

const HIT_MSGS = [
  "Valid hit.",
  "Aur zor se.",
  "Office trauma detected.",
  "Approved.",
  "Yeh personal tha 😄",
  "Bilkul sahi.",
  "Bahut hua 😤",
  "HR kahan hai?",
  "Cathartic.",
  "Main theek hoon 😌"
];

const BYE_MSG = {
  vijaya: "Vijaya has left the chat 💨",
  kodru:  "Kodru couldn't handle it 💀"
};

const STARS = ['⭐','💥','✨','🌟','💫','😵','🌀','👊','🎯','💢'];
const CONF_COLORS = ['#f59e0b','#ef4444','#8b5cf6','#3b82f6','#10b981','#ec4899','#f97316'];

let hp = {}, gone = {}, busy = {}, score = 0;

function init() {
  ['vijaya','kodru'].forEach(id => {
    hp[id] = MAX[id]; gone[id] = false; busy[id] = false;
    const el = document.getElementById(id);
    el.style.display = 'flex';
    el.classList.remove('bonked','fly-away');
    document.getElementById(id+'-hp').style.width = '100%';
  });
  score = 0;
  document.getElementById('score').textContent = 0;
  showToast('Tap someone. You know you want to. 👀');
  document.querySelectorAll('.star,.bye,.conf').forEach(e => e.remove());
  document.getElementById('win').classList.remove('show');
}

function bonk(id) {
  if (gone[id] || busy[id]) return;
  busy[id] = true;

  hp[id]--;
  score++;
  document.getElementById('score').textContent = score;
  document.getElementById(id+'-hp').style.width = Math.max(0, hp[id]/MAX[id]*100) + '%';

  showToast(HIT_MSGS[Math.floor(Math.random() * HIT_MSGS.length)]);

  const trisha = document.getElementById('trisha');
  const dir = id === 'vijaya' ? 'hit-left' : 'hit-right';
  trisha.classList.remove('hit-left','hit-right');
  void trisha.offsetWidth;
  trisha.classList.add(dir);
  trisha.addEventListener('animationend', () => trisha.classList.remove(dir), { once: true });

  spawnStars(document.getElementById(id));

  if (hp[id] <= 0) {
    setTimeout(() => kill(id), 200);
  } else {
    const el = document.getElementById(id);
    el.classList.remove('bonked');
    void el.offsetWidth;
    el.classList.add('bonked');
    el.addEventListener('animationend', () => {
      el.classList.remove('bonked');
      busy[id] = false;
    }, { once: true });
  }
}

function kill(id) {
  gone[id] = true;
  const el    = document.getElementById(id);
  const arena = document.getElementById('arena');
  const rect  = el.getBoundingClientRect();
  const ar    = arena.getBoundingClientRect();

  const bye = document.createElement('div');
  bye.className = 'bye';
  bye.textContent = BYE_MSG[id];
  bye.style.left = (rect.left - ar.left - 10) + 'px';
  bye.style.top  = (rect.top  - ar.top  - 10) + 'px';
  arena.appendChild(bye);
  bye.addEventListener('animationend', () => bye.remove());

  el.classList.add('fly-away');
  el.addEventListener('animationend', () => {
    el.style.display = 'none';
    busy[id] = false;
    checkWin();
  }, { once: true });
}

function checkWin() {
  if (gone.vijaya && gone.kodru) {
    spawnConfetti();
    setTimeout(() => document.getElementById('win').classList.add('show'), 600);
  }
}

function spawnStars(parentEl) {
  const arena = document.getElementById('arena');
  const rect  = parentEl.getBoundingClientRect();
  const ar    = arena.getBoundingClientRect();
  const cx = rect.left - ar.left + rect.width  / 2;
  const cy = rect.top  - ar.top  + rect.height / 2;
  for (let i = 0; i < 6; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.textContent = STARS[Math.floor(Math.random() * STARS.length)];
    const a = Math.random() * Math.PI * 2;
    const d = 40 + Math.random() * 40;
    s.style.setProperty('--dx', Math.cos(a)*d + 'px');
    s.style.setProperty('--dy', Math.sin(a)*d + 'px');
    s.style.left = (cx - 14) + 'px';
    s.style.top  = (cy - 14) + 'px';
    s.style.animationDelay = (i * 0.055) + 's';
    arena.appendChild(s);
    s.addEventListener('animationend', () => s.remove());
  }
}

function spawnConfetti() {
  const arena = document.getElementById('arena');
  for (let i = 0; i < 50; i++) {
    const c = document.createElement('div');
    c.className = 'conf';
    c.style.left = Math.random() * 100 + '%';
    c.style.background = CONF_COLORS[Math.floor(Math.random() * CONF_COLORS.length)];
    c.style.setProperty('--dur', (1.1 + Math.random() * 0.9).toFixed(2) + 's');
    c.style.animationDelay = (Math.random() * 0.7).toFixed(2) + 's';
    arena.appendChild(c);
    c.addEventListener('animationend', () => c.remove());
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.style.opacity = '0';
  setTimeout(() => { t.textContent = msg; t.style.opacity = '1'; }, 160);
}

function reset() { init(); }

init();
</script>
</body>
</html>
